# =============================================
#   Server Configuration
# =============================================
server.port=8080

# =============================================
#   Application Name
# =============================================
spring.application.name=pet-adoption

# =============================================
#   MySQL DataSource Configuration
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/pet_adoption_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Fortknox123$
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
#   JPA / Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
#   Jackson (JSON) Configuration
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# =============================================
#   Logging Configuration
# =============================================
logging.level.com.petadoption=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
